<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css">
    <title>Sing Up </title>
</head>
<body class="">
        <section class="h-screen flex justify-center items-center text-white bg-[#011316]
        ">
            <div class="bg-gradient-to-tl from-[#022130] p-1 to-[#012125] rounded-tl-[25px] rounded-br-[25px]
            ">
                <div class="px-1 py-5 w-100 max-sm:w-70 bg-gradient-to-br to-[#1f1801] from-[#033126] rounded-tl-[24px] rounded-br-[24px]
                ">
                    <!-- heading welcome to creat acc -->
                    <div>
                        <p class="text-xl font-semibold font-serif tracking-widest text-center
                        max-sm:text-sm
                        ">
                            VA-Student Registration</p>
    
                        <p class="text-gray-200/80 text-sm tracking-widest text-center
                        ">
                            Create your account</p>
                    </div>
                     
                       <!-- form with input  -->
                    <form action="#">
                         <!-- username and email -->
                        <div class="flex justify-center gap-3
                        max-sm:flex-col
                        ">
                                <!-- username -->
                            <div class="grid gap-1
                            ">
                                <label 
                                class="text-sm pl-3"
                                for="name">Name
                                </label>
                                <input
                                class="outline-none text-sm text-center bg-gray-600/40 py-0.5 rounded-md " 
                                type="text"
                                id="name"
                                placeholder="Enter name"
                                >   
                            </div>
                                <!--  address -->
                            <div class="grid gap-1 m
                            ">
                                <label 
                                class="text-sm pl-3"
                                for="address">address
                                </label>
                                <input
                                class="outline-none text-sm text-center bg-gray-600/40 py-0.5 rounded-md " 
                                type="text"
                                id="address"
                                placeholder="Enter address"
                                >   
                            </div>
                        </div>
                        <!-- class and email -->
                        <div class="flex justify-center gap-3
                        max-sm:flex-col
                        ">
                                <!-- class -->
                            <div class="grid gap-1
                            ">
                                <label 
                                class="text-sm pl-3"
                                for="class">class
                                </label>
                                <input
                                class="outline-none text-sm text-center bg-gray-600/40 py-0.5 rounded-md " 
                                type="number"
                                id="class"
                                placeholder="Enter class"
                                >   
                            </div>
                                <!-- email  -->
                            <div class="grid gap-1 m
                            ">
                                <label 
                                class="text-sm pl-3"
                                for="email">Email
                                </label>
                                <input
                                class="outline-none text-sm text-center bg-gray-600/40 py-0.5 rounded-md " 
                                type="text"
                                id="email"
                                placeholder="Enter email address"
                                >   
                            </div>
                        </div>
                        <!-- password -->
                         <div>
                            <div class="mt-3 grid items-center gap-1 px-3 max-sm:px-0
                            ">
                                <label 
                                class="text-sm pl-3"
                                for="password">Password
                                </label>
                                <input
                                class="outline-none text-sm text-center bg-gray-600/40 py-0.5 rounded-md" 
                                type="password"
                                id="password"
                                placeholder="password"
                                >   
                            </div>
    
                            <!-- strong password -->
                             <div class="mx-5 mt-1 max-sm:mt-1 
                             max-sm:mx-1
                             ">
                                <p class="text-[12px] flex gap-2 text-gray-300
                                max-sm:text-[10px]
                                ">
                                     <input 
                                     class="max-sm:scale-60 accent-[orange]"
                                     type="radio">
                                     Key must have special symbols like @#$% etc.
                                </p>
                                <p class="text-[12px] flex gap-2 text-gray-300
                                max-sm:text-[10px]
                                ">
                                     <input
                                     class="max-sm:scale-60" 
                                     type="radio">
                                     Key must be longer than 8 symbols
                                </p>
                             </div>
                             <!-- confirm password -->
                              <div class="mt-3 grid items-center gap-1 px-3 max-sm:px-0
                            ">
                                <label 
                                class="text-sm pl-3"
                                for="confirm_password">Confirm password
                                </label>
                                <input
                                class="outline-none text-sm text-center bg-gray-600/40 py-0.5 rounded-md" 
                                type="password"
                                id="confirm_password"
                                placeholder="confirm password"
                                >   
                            </div>
                                <!-- already have an account -->
                            <div class="text-[10px] text-end mr-7
                            ">
                                <p>already have an account ?
                                <span>
                                    <a 
                                    class="text-[blue] ml-2"
                                    href="signin_project94.html">Sign in</a>
                                </span>
                                </p>
                                    
                                </a>
                            </div>
                         </div>
                         <!-- submit button -->
                          <div class="mt-8 mb-2 bg-[#0ce27e] mx-5 py-1 rounded-md text-center text-black font-bold
                          max-sm:mt-5
                          ">
                              <button>
                                Sign up
                              </button>
                          </div>
                    </form>
                </div>
            </div>
        </section>
</body>
</html>
