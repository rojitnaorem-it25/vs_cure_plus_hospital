//5. rock paper scissor using function 

        function playGame(playerMove)
        { 
            const computerMove = pickComputerMove();
        
            let result = ''; 

            // player Scissors
        if(playerMove === 'scissors')
        {
            if(computerMove === 'Rock')
            {
                result = 'You loose';
            }

            else if(computerMove === 'paper')
            {
                result = 'You Win !!!';
            }

            else if(computerMove === 'scissors')
            {
                result = 'Tie'
            }
        }

        // player Rock
        else if(playerMove === 'Rock')
        {
            if(computerMove === 'Rock')
            {
                result = 'Tie';
            }

            else if(computerMove === 'paper')
            {
                result = 'You loose';
            }

            else if(computerMove === 'scissors')
            {
                result = 'You Win !!!!'
            }
        }

            // player Paper
            else if(playerMove === 'paper')
        {
            if(computerMove === 'Rock')
            {
                result = 'You win !!!';
            }

            else if(computerMove === 'paper')
            {
                result = 'Tie';
            }

            else if(computerMove === 'scissors')
            {
                result = 'You loose'
            }
        }


            alert(`You picked ${playerMove} \n Computer picked ${computerMove} \n \n ${result}`);
        }
        


        // range of math.random common
        
        function pickComputerMove()
        {
            const randomMath = Math.random();
            
            if(randomMath >=0 && randomMath < 1/3)
            {
                computerMove = 'Rock'; 
            } 

            else if(randomMath >= 1/3 && randomMath < 2/3)
            {
                computerMove = 'paper';
            } 
            
            else if(randomMath >= 2/3 && randomMath < 1)
            {
                computerMove = 'scissors';
            }

            return computerMove;
        }
